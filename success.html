<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Form Submitted Successfully - Inventory Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
      background-color: #f8f9fa;
    }
    .success-container {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .success-icon {
      color: #28a745;
      font-size: 60px;
      margin-bottom: 20px;
    }
    h1 {
      color: #28a745;
      margin-bottom: 15px;
    }
    p {
      color: #6c757d;
      margin-bottom: 30px;
      font-size: 16px;
      line-height: 1.5;
    }
    .btn-close {
      background-color: #007cba;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-right: 10px;
      text-decoration: none;
      display: inline-block;
    }
    .btn-close:hover {
      background-color: #005a8b;
    }
    .btn-secondary {
      background-color: #6c757d;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      text-decoration: none;
      display: inline-block;
    }
    .btn-secondary:hover {
      background-color: #545b62;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <div class="success-icon">✓</div>
    <h1>Thank You!</h1>
    <p>Your form has been submitted successfully. We have received your information and will get back to you soon.</p>
    
    <a href="index.html" class="btn-close">Submit Another Form</a>
    <a href="index.html" class="btn-secondary">Go Back to Form</a>
  </div>

  <script>
    // Auto-redirect to form after 10 seconds if user doesn't interact
    setTimeout(function() {
      if (confirm("Would you like to go back to the form?")) {
        window.location.href = "index.html";
      }
    }, 10000);
  </script>
</body>
</html>
